<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HIRE SMART | Intelligent Resume Ranking</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #fdfcfa;
      font-family: 'Space Grotesk', sans-serif;
      color: #2c2417;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-family: 'Rubik Glitch', cursive;
      font-size: 72px;
      color: #ff6b35;
      text-shadow: 3px 3px #d45a2a;
      animation: glitchShake 2s infinite alternate;
    }

    @keyframes glitchShake {
      0% { transform: translate(0px, 0px); }
      25% { transform: translate(1px, -1px); }
      50% { transform: translate(-1px, 1px); }
      75% { transform: translate(1px, 1px); }
      100% { transform: translate(0px, 0px); }
    }

    p {
      font-size: 20px;
      color: #444;
      margin-bottom: 50px;
      letter-spacing: 0.5px;
    }

    .btn-hire {
      background: #ff6b35;
      border: 2px solid #ff6b35;
      box-shadow: 3px 3px 0 #d45a2a;
      color: white;
      font-weight: 600;
      padding: 15px 40px;
      font-size: 20px;
      border-radius: 10px;
      transition: all 0.2s ease;
      margin: 10px;
    }

    .btn-hire:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 #d45a2a;
      color: white;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>
  <h1>HIRE SMART</h1>
  <p>Intelligent Resume Ranking • Powered by AI</p>

  <div class="d-flex justify-content-center">
    <a href="/recruiter" class="btn btn-hire">Login as Recruiter</a>
    <a href="/student" class="btn btn-hire">Login as Student</a>
  </div>

  <footer>© 2025 HIRE SMART – Intelligent Candidate Ranking System</footer>
</body>
</html>
