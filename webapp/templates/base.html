<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}HIRE SMART{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    :root{
      --primary:#ff6b35; --secondary:#ff8c42; --bg:#fdfcfa; --brown:#2c2417;
    }
    body { background: var(--bg); color: var(--brown); font-family: 'Space Grotesk', sans-serif; }
    .brand { font-family: 'Rubik Glitch', cursive; font-size: 32px; color: var(--primary); }
    .btn-primary-custom {
      background: var(--primary);
      border: 2px solid var(--primary);
      color: white;
      box-shadow: 3px 3px 0 #d45a2a;
    }
    .card-theme {
      border: 2px solid var(--primary);
      border-radius: 12px;
      box-shadow: 4px 4px 0 #ffe0d1, 8px 8px 0 #ffc4a8;
    }
    .table thead th { background: linear-gradient(90deg,var(--primary),var(--secondary)); color:white; }
    .rank-badge { background: var(--primary); color: white; padding:8px 12px; border-radius:999px; font-weight:700; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-4" style="background:linear-gradient(90deg,var(--primary),var(--secondary));">
    <div class="container">
      <a class="navbar-brand text-white brand" href="{{ url_for('index') }}">HIRE SMART</a>
      <div>
        <a class="btn btn-light btn-sm me-2" href="{{ url_for('recruiter') }}">Recruiter</a>
        <a class="btn btn-light btn-sm" href="{{ url_for('student') }}">Student</a>
      </div>
    </div>
  </nav>

  <div class="container mb-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'success' if category=='success' else ('warning' if category=='warning' else 'info') }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <footer class="text-center py-3 text-muted">
    &copy; {{ 2025 }} HIRE SMART
  </footer>
</body>
</html>
